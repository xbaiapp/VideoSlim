name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Flutter and Android checks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle fallback
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.1.0

      - name: Select Android Gradle launcher
        shell: bash
        run: |
          if git ls-files --error-unmatch android/gradlew >/dev/null 2>&1; then
            chmod +x android/gradlew
            echo 'GRADLE_COMMAND=./gradlew' >> "$GITHUB_ENV"
          else
            echo 'GRADLE_COMMAND=gradle' >> "$GITHUB_ENV"
          fi

      - name: Fetch dependencies
        run: flutter pub get

      - name: Configure Android checkout paths
        shell: bash
        run: |
          flutter_sdk="$(dirname "$(dirname "$(command -v flutter)")")"
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' \
            "$flutter_sdk" "$ANDROID_HOME" > android/local.properties

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Run Android JVM tests
        working-directory: android
        run: $GRADLE_COMMAND test --no-daemon

      - name: Run Android debug lint
        working-directory: android
        run: $GRADLE_COMMAND lintDebug --no-daemon

      - name: Run Android release lint
        working-directory: android
        run: $GRADLE_COMMAND lintRelease --no-daemon

      - name: Assemble Android debug
        working-directory: android
        run: $GRADLE_COMMAND assembleDebug --no-daemon

      - name: Assemble Android release
        working-directory: android
        run: $GRADLE_COMMAND assembleRelease --no-daemon
